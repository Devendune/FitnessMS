spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: FITNESSSERVICE
          uri: lb://fitnessservice
          predicates:
            - Path=/api/users/**

        - id: ACTIVITYSERVICE
          uri: lb://activityMS
          predicates:
            - Path=/api/activities/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.netflix.discovery: DEBUG
