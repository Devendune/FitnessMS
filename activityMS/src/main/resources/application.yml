spring:
  application:
    name: activityMS
  data:
    mongodb:
      uri: mongodb://localhost:27017/FitnessActivity
      database: FitnessActivity

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitnessExchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
  hostname: localhost
  port: 5672
  username: guest
  password: guest
